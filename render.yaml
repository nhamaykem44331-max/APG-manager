services:
  - type: web
    name: apg-manager-api
    runtime: node
    plan: starter
    region: singapore
    rootDir: apps/api
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/v1/system/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://manager.tanphuapg.com
      - key: PRISMA_CONNECTION_LIMIT
        value: "2"
      - key: PRISMA_POOL_TIMEOUT
        value: "30"
      - key: PRISMA_CONNECT_TIMEOUT
        value: "15"
      - key: PRISMA_APPLICATION_NAME
        value: apg-manager-api
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
